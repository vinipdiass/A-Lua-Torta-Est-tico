<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#061014">
    <title>Raças | Brilho Esquecido</title>
    <link rel="icon" type="image/webp" href="../assets/icone.webp">
    <link rel="stylesheet" href="../racas.css">
  </head>
  <body>
    <video class="species-background" autoplay muted loop playsinline preload="metadata">
      <source src="../capitulos_historia/background_chap3.webm" type="video/webm">
    </video>
    <audio id="chapter-three-soundtrack" src="../soundtrack/14 - Creaking Bones.mp3" preload="metadata" loop></audio>
    <div class="species-veil" aria-hidden="true"></div>

    <header class="species-header">
      <a class="species-header__back" href="index.html?view=chapter3">← Voltar ao Capítulo 3</a>
      <div class="species-header__title">
        <span>BRILHO ESQUECIDO</span>
        <strong>Raças de Druskenvald</strong>
      </div>
      <button id="volume-control" class="volume-control" type="button" aria-label="Volume: 100%. Clique para diminuir.">
        <span id="volume-control-icon" class="volume-control__icon" aria-hidden="true">🔊</span>
        <span id="volume-control-value" class="volume-control__value">100%</span>
      </button>
    </header>

    <main class="species-carousel" aria-label="Carrossel de raças">
      <button id="species-prev" class="species-carousel__nav species-carousel__nav--prev" type="button" aria-label="Raça anterior">‹</button>

      <aside class="species-preview species-preview--prev" aria-hidden="true">
        <img id="species-prev-image" alt="">
        <span id="species-prev-name"></span>
      </aside>

      <section class="species-focus">
        <figure class="species-portrait">
          <div class="species-portrait__halo" aria-hidden="true"></div>
          <img id="species-image" alt="">
          <figcaption id="species-position"></figcaption>
        </figure>

        <article id="species-card" class="species-card" aria-live="polite">
          <header class="species-card__header">
            <span id="species-original-name" class="species-card__original"></span>
            <h1 id="species-name"></h1>
          </header>

          <div id="species-card-scroll" class="species-card__scroll">
            <div id="species-introduction" class="species-introduction"></div>
            <dl id="species-metadata" class="species-metadata"></dl>

            <section class="species-traits">
              <h2 id="species-traits-title">Traços</h2>
              <p id="species-traits-guide" class="species-traits__guide"></p>
              <div id="species-features"></div>
            </section>
          </div>
        </article>
      </section>

      <aside class="species-preview species-preview--next" aria-hidden="true">
        <img id="species-next-image" alt="">
        <span id="species-next-name"></span>
      </aside>

      <button id="species-next" class="species-carousel__nav species-carousel__nav--next" type="button" aria-label="Próxima raça">›</button>

      <p id="species-status" class="species-status" role="status">Consultando as linhagens…</p>
    </main>

    <script>window.LUA_TORTA_ASSET_BASE = "../";</script>
    <script src="../asset-paths.js"></script>
    <script src="../racas.js"></script>
    <script src="../chapter3-ambience.js"></script>
  </body>
</html>
