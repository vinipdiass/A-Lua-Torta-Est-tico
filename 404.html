<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#120f0a">
    <title>Em breve</title>
    <link rel="icon" type="image/webp" href="assets/icone.webp">
    <style>
      :root {
        color-scheme: dark;
        --gold: #d5b46d;
        --ink: #120f0a;
        --moss: #26352a;
        --paper: #f1e7cf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--ink);
      }

      body {
        min-height: 100svh;
        overflow: hidden;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--paper);
      }

      .empty-stage {
        position: relative;
        display: grid;
        min-height: 100svh;
        grid-template-columns: minmax(0, 1fr) minmax(250px, 38vw);
        align-items: center;
        gap: clamp(24px, 6vw, 88px);
        padding: clamp(28px, 7vw, 96px);
        isolation: isolate;
      }

      .empty-stage::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background:
          linear-gradient(90deg, rgba(18, 15, 10, 0.98), rgba(38, 53, 42, 0.84)),
          repeating-linear-gradient(135deg, rgba(213, 180, 109, 0.08) 0 1px, transparent 1px 18px);
      }

      .empty-stage::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        z-index: -1;
        height: 34vh;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.46));
      }

      .empty-copy {
        max-width: 760px;
        text-shadow: 0 5px 28px rgba(0, 0, 0, 0.72);
      }

      .empty-copy h1 {
        margin: 0;
        color: var(--paper);
        font-size: clamp(2.2rem, 7.4vw, 6.8rem);
        font-weight: 400;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .empty-copy span {
        display: block;
        width: fit-content;
        margin-bottom: clamp(18px, 4vh, 34px);
        border-bottom: 1px solid rgba(213, 180, 109, 0.72);
        color: var(--gold);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.24em;
        line-height: 2.2;
        text-transform: uppercase;
      }

      .empty-figure {
        position: relative;
        justify-self: center;
        width: min(100%, 420px);
      }

      .empty-figure img {
        display: block;
        width: 100%;
        max-height: min(76svh, 680px);
        object-fit: contain;
        filter: drop-shadow(0 26px 42px rgba(0, 0, 0, 0.56));
      }

      @media (max-width: 760px) {
        body {
          overflow: auto;
        }

        .empty-stage {
          min-height: 100svh;
          grid-template-columns: 1fr;
          align-content: center;
          padding: 30px 22px;
          text-align: center;
        }

        .empty-copy {
          order: 2;
        }

        .empty-copy span {
          margin-inline: auto;
        }

        .empty-figure {
          order: 1;
          width: min(72vw, 260px);
        }

        .empty-copy h1 {
          font-size: clamp(2rem, 11.8vw, 4.4rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="empty-stage" aria-label="Conteúdo em breve">
      <section class="empty-copy">
        <span>Por enquanto</span>
        <h1>Desculpe, o que você procura ainda não tá aqui! Mas volte em breve, quem sabe você encontra algo :)</h1>
      </section>

      <figure class="empty-figure" aria-hidden="true">
        <img src="assets/kuo toa.png" alt="">
      </figure>
    </main>
  </body>
</html>
